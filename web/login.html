<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Login | Ocean View Resort</title>
    <link rel="stylesheet" href="CSS/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #4361ee, #4cc9f0);
            --bg-gradient: radial-gradient(circle at top right, #f8f9ff 0%, #e0e7ff 100%);
            --glass-bg: rgba(255, 255, 255, 0.9);
            --card-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-wrapper {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .auth-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 40px;
            box-shadow: var(--card-shadow);
            border: 1px solid rgba(255, 255, 255, 0.8);
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .auth-card:hover {
            transform: translateY(-5px);
        }

        .auth-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: var(--primary-gradient);
        }

        /* Logo Area */
        .logo-container {
            text-align: center;
            margin-bottom: 24px;
        }

        .brand-logo {
            width: 70px;
            height: 70px;
            object-fit: contain;
            margin-bottom: 16px;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
        }

        .login-illustration {
            width: 64px;
            height: 64px;
            background: rgba(67, 97, 238, 0.1);
            color: #4361ee;
            border-radius: 18px;
            display: grid;
            place-items: center;
            font-size: 28px;
            margin: 0 auto 16px;
        }

        /* Form Styling */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #4b5563;
            margin-bottom: 8px;
            margin-left: 4px;
        }

        .input-group {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-group i {
            position: absolute;
            left: 16px;
            color: #9ca3af;
            font-size: 16px;
            transition: color 0.3s ease;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            border-radius: 12px;
            border: 2px solid #f3f4f6;
            background: #f9fafb;
            font-size: 15px;
            transition: all 0.3s ease;
            outline: none;
            box-sizing: border-box;
        }

        .form-input:focus {
            border-color: #4361ee;
            background: #fff;
            box-shadow: 0 0 0 4px rgba(67, 97, 238, 0.1);
        }

        .form-input:focus + i {
            color: #4361ee;
        }

        /* Button Styling */
        .btn-primary {
            background: var(--primary-gradient);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            box-shadow: 0 10px 15px -3px rgba(67, 97, 238, 0.3);
            margin-top: 24px;
        }

        .btn-primary:hover {
            opacity: 0.9;
            transform: scale(1.01);
            box-shadow: 0 12px 20px -3px rgba(67, 97, 238, 0.4);
        }

        .btn-primary:disabled {
            background: #9ca3af;
            cursor: not-allowed;
            transform: none;
        }

        #errorMsg {
            background: #fff5f5;
            color: #e53e3e;
            padding: 12px;
            border-radius: 10px;
            margin-top: 20px;
            text-align: center;
            font-size: 14px;
            font-weight: 500;
            display: none;
            border: 1px solid #feb2b2;
            animation: shake 0.4s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .footer-text {
            margin-top: 32px;
            text-align: center;
            border-top: 1px solid #f3f4f6;
            padding-top: 20px;
            font-size: 12px;
            color: #9ca3af;
            letter-spacing: 0.5px;
        }
    </style>
</head>

<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="logo-container">
                <img src="assests/OVRLogo.png" alt="Ocean View Logo" class="brand-logo">
                <h2 style="color: #1f2937; font-size: 26px; margin: 0 0 6px; font-weight: 800;">Staff Portal</h2>
                <p style="color: #6b7280; font-size: 14px; margin: 0; font-weight: 500;">Ocean View Resort & Spa Management</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Email Address</label>
                    <div class="input-group">
                        <input type="email" id="username" name="username" class="form-input"
                            placeholder="name@oceanview.com" required>
                        <i class="fas fa-envelope"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-group">
                        <input type="password" id="password" name="password" class="form-input" placeholder="••••••••"
                            required>
                        <i class="fas fa-lock"></i>
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="btn-primary">
                    <span>Sign In</span>
                    <i class="fas fa-arrow-right" style="font-size: 14px; margin-left: 10px;"></i>
                </button>

                <div id="errorMsg"></div>
            </form>

            <div class="footer-text">
                &copy; 2026 Ocean View Resort & Spa • Internal Access Only
            </div>
        </div>
    </div>

    <script>
        // No changes made to your logic - purely UI/UX enhancements above
        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const form = this;
            const submitBtn = document.getElementById('submitBtn');
            const errorMsg = document.getElementById('errorMsg');

            // Loading state
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Authenticating...';
            errorMsg.style.display = 'none';

            const formData = new FormData(form);
            const params = new URLSearchParams(formData);

            fetch('admin/login', {
                method: 'POST',
                body: params
            })
                .then(async response => {
                    if (response.ok) {
                        const result = await response.json();
                        submitBtn.innerHTML = '<i class="fas fa-check"></i> Success!';
                        setTimeout(() => {
                            if (result.role === 'ADMIN') {
                                window.location.href = 'admin-dashboard.html';
                            } else if (result.role === 'RECEPTIONIST') {
                                window.location.href = 'receptionist-dashboard.html';
                            } else {
                                window.location.href = 'dashboard.html';
                            }
                        }, 500);
                    } else {
                        const errorText = await response.text();
                        errorMsg.style.display = 'block';
                        if (response.status === 401) {
                            errorMsg.innerText = 'Invalid email or password.';
                        } else if (response.status === 404) {
                            errorMsg.innerText = 'Server error: Login service not found.';
                        } else {
                            errorMsg.innerText = 'Error: ' + errorText;
                        }
                        resetBtn();
                    }
                })
                .catch(err => {
                    errorMsg.style.display = 'block';
                    errorMsg.innerText = 'Connection error: Could not reach the server.';
                    console.error(err);
                    resetBtn();
                });

            function resetBtn() {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<span>Sign In</span><i class="fas fa-arrow-right" style="font-size: 14px; margin-left: 10px;"></i>';
            }
        });
    </script>
</body>
</html>
