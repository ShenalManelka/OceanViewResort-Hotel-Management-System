<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Login | Ocean View Resort</title>
    <link rel="stylesheet" href="CSS/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .auth-card {
            position: relative;
            overflow: hidden;
        }

        .auth-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--primary-color), var(--accent-color));
        }

        .input-group {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-group i {
            position: absolute;
            left: 16px;
            color: var(--text-secondary);
            font-size: 14px;
            transition: var(--transition);
        }

        .input-group .form-input {
            padding-left: 44px;
        }

        .input-group .form-input:focus+i {
            color: var(--primary-color);
        }

        .login-illustration {
            width: 80px;
            height: 80px;
            background: rgba(67, 97, 238, 0.1);
            color: var(--primary-color);
            border-radius: 20px;
            display: grid;
            place-items: center;
            font-size: 32px;
            margin: 0 auto 24px;
            box-shadow: var(--shadow-sm);
        }
    </style>
</head>

<body>
    <div class="auth-wrapper">
        <div class="auth-card glass">
            <div class="login-illustration">
                <i class="fas fa-user-lock"></i>
            </div>

            <div style="text-align: center; margin-bottom: 32px;">
                <h2 style="color: var(--text-primary); font-size: 24px; margin-bottom: 8px; font-weight: 800;">Staff
                    Portal</h2>
                <p style="color: var(--text-secondary); font-size: 14px; font-weight: 500;">Secure login for Ocean View
                    Resort management</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Email Address</label>
                    <div class="input-group">
                        <input type="email" id="username" name="username" class="form-input"
                            placeholder="name@oceanview.com" required>
                        <i class="fas fa-envelope"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-group">
                        <input type="password" id="password" name="password" class="form-input" placeholder="••••••••"
                            required>
                        <i class="fas fa-key"></i>
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="btn btn-primary"
                    style="width: 100%; margin-top: 12px; height: 48px;">
                    <span>Sign In</span>
                    <i class="fas fa-arrow-right" style="font-size: 12px; margin-left: 8px;"></i>
                </button>

                <div id="errorMsg"
                    style="background: rgba(239, 71, 111, 0.1); color: var(--error); padding: 12px; border-radius: 8px; margin-top: 20px; text-align: center; font-size: 13px; font-weight: 600; display: none; border: 1px solid rgba(239, 71, 111, 0.2);">
                </div>
            </form>

            <div
                style="margin-top: 32px; text-align: center; border-top: 1px solid var(--glass-border); padding-top: 24px;">
                <p style="font-size: 12px; color: var(--text-secondary); font-weight: 500;">&copy; 2026 Ocean View
                    Resort & Spa</p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const form = this;
            const submitBtn = document.getElementById('submitBtn');
            const errorMsg = document.getElementById('errorMsg');

            // Loading state
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Authenticating...';
            errorMsg.style.display = 'none';

            const formData = new FormData(form);
            const params = new URLSearchParams(formData);

            fetch('admin/login', {
                method: 'POST',
                body: params
            })
                .then(async response => {
                    if (response.ok) {
                        const result = await response.json();
                        submitBtn.innerHTML = '<i class="fas fa-check"></i> Success!';
                        setTimeout(() => {
                            if (result.role === 'ADMIN') {
                                window.location.href = 'admin-dashboard.html';
                            } else if (result.role === 'RECEPTIONIST') {
                                window.location.href = 'receptionist-dashboard.html';
                            } else {
                                window.location.href = 'dashboard.html';
                            }
                        }, 500);
                    } else {
                        const errorText = await response.text();
                        errorMsg.style.display = 'block';
                        if (response.status === 401) {
                            errorMsg.innerText = 'Invalid email or password.';
                        } else if (response.status === 404) {
                            errorMsg.innerText = 'Server error: Login service not found.';
                        } else {
                            errorMsg.innerText = 'Error: ' + errorText;
                        }
                        resetBtn();
                    }
                })
                .catch(err => {
                    errorMsg.style.display = 'block';
                    errorMsg.innerText = 'Connection error: Could not reach the server.';
                    console.error(err);
                    resetBtn();
                });

            function resetBtn() {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<span>Sign In</span><i class="fas fa-arrow-right" style="font-size: 12px; margin-left: 8px;"></i>';
            }
        });
    </script>
</body>

</html>
