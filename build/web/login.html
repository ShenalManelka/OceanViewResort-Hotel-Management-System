<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Ocean View Resort</title>
    <link rel="stylesheet" href="CSS/style.css">
</head>

<body>
    <div class="auth-wrapper">
        <div class="auth-card glass">
            <h2 style="text-align: center; color: var(--primary-color);">Ocean View Resort</h2>
            <p style="text-align: center; color: var(--text-secondary); margin-bottom: 30px;">Administrator Login</p>

            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" class="form-input" placeholder="Enter username"
                        required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-input" placeholder="Enter password"
                        required>
                </div>
                <button type="submit" class="btn btn-primary"
                    style="width: 100%; justify-content: center; margin-top: 10px;">Login</button>
                <div id="errorMsg"
                    style="color: var(--error); margin-top: 15px; text-align: center; font-size: 14px; display: none;">
                </div>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const formData = new FormData(this);
            const params = new URLSearchParams(formData);
            const errorMsg = document.getElementById('errorMsg');

            fetch('admin/login', {
                method: 'POST',
                body: params
            })
                .then(async response => {
                    if (response.ok) {
                        window.location.href = 'dashboard.html';
                    } else {
                        const errorText = await response.text();
                        errorMsg.style.display = 'block';
                        if (response.status === 401) {
                            errorMsg.innerText = 'Invalid username or password.';
                        } else if (response.status === 404) {
                            errorMsg.innerText = 'Server error: Login servlet not found (404).';
                        } else {
                            errorMsg.innerText = 'Server Error ' + response.status + ': ' + errorText;
                        }
                    }
                })
                .catch(err => {
                    errorMsg.style.display = 'block';
                    errorMsg.innerText = 'Connection error: Could not reach the server.';
                    console.error(err);
                });
        });
    </script>
</body>

</html>
